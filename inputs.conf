# ============================================================
# FILE: inputs.conf
# Project: Home SIEM Lab — Splunk Enterprise
# Author: Shyam Ravi
# Description: Universal Forwarder input configuration
#              Deploy this on each endpoint (Windows / Ubuntu)
# Location: $SPLUNK_HOME/etc/system/local/inputs.conf
# ============================================================


# ------------------------------------------------------------
# WINDOWS 10 — inputs.conf
# ------------------------------------------------------------

# Windows Security Event Log (login events, process creation, etc.)
[WinEventLog://Security]
disabled = false
index = main
start_from = oldest
current_only = 0
checkpointInterval = 5
renderXml = false

# Windows System Event Log
[WinEventLog://System]
disabled = false
index = main
start_from = oldest
current_only = 0

# Windows Application Event Log
[WinEventLog://Application]
disabled = false
index = main
start_from = oldest
current_only = 0

# PowerShell Script Block Logging (requires GPO enabled)
[WinEventLog://Microsoft-Windows-PowerShell/Operational]
disabled = false
index = main
start_from = oldest
current_only = 0

# Sysmon Event Log (if Sysmon is installed — highly recommended)
[WinEventLog://Microsoft-Windows-Sysmon/Operational]
disabled = false
index = main
start_from = oldest
current_only = 0


# ------------------------------------------------------------
# UBUNTU — inputs.conf
# ------------------------------------------------------------

# SSH authentication log (brute-force detection)
[monitor:///var/log/auth.log]
disabled = false
index = main
sourcetype = linux_secure
ignoreOlderThan = 7d

# General syslog
[monitor:///var/log/syslog]
disabled = false
index = main
sourcetype = syslog

# Kernel messages
[monitor:///var/log/kern.log]
disabled = false
index = main
sourcetype = linux_messages_syslog

# UFW Firewall logs (if UFW is enabled)
[monitor:///var/log/ufw.log]
disabled = false
index = main
sourcetype = linux_ufw

# Cron job logs (for persistence detection)
[monitor:///var/log/cron.log]
disabled = false
index = main
sourcetype = syslog
