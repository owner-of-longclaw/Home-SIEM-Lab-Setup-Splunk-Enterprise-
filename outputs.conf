# ============================================================
# FILE: outputs.conf
# Project: Home SIEM Lab — Splunk Enterprise
# Author: Shyam Ravi
# Description: Universal Forwarder output configuration
#              Tells the forwarder WHERE to send logs
#              Deploy this on each endpoint (Windows / Ubuntu)
# Location: $SPLUNK_HOME/etc/system/local/outputs.conf
# ============================================================


# ------------------------------------------------------------
# FORWARD TO SPLUNK ENTERPRISE INDEXER
# ------------------------------------------------------------

[tcpout]
defaultGroup = splunk_indexer

# Replace SPLUNK_SERVER_IP with your Splunk Enterprise machine's IP
# Default receiving port is 9997
[tcpout:splunk_indexer]
server = SPLUNK_SERVER_IP:9997

# Enable compression for faster log forwarding
compressed = true

# SSL (recommended even in home labs — good practice)
# Uncomment below if you configure SSL certificates
# sslCertPath = $SPLUNK_HOME/etc/auth/server.pem
# sslRootCAPath = $SPLUNK_HOME/etc/auth/cacert.pem
# sslVerifyServerCert = false


# ------------------------------------------------------------
# INDEXER ACKNOWLEDGEMENT (prevents log loss)
# ------------------------------------------------------------

[tcpout:splunk_indexer]
useACK = true

