# ============================================================
# FILE: props.conf
# Project: Home SIEM Lab — Splunk Enterprise
# Author: Shyam Ravi
# Description: Source type parsing and field extraction rules
#              Deploy on Splunk Enterprise (Indexer)
# Location: $SPLUNK_HOME/etc/system/local/props.conf
# ============================================================


# ------------------------------------------------------------
# LINUX SECURE / AUTH LOG (SSH brute-force detection)
# ------------------------------------------------------------

[linux_secure]
SHOULD_LINEMERGE = false
TIME_PREFIX = \s
MAX_TIMESTAMP_LOOKAHEAD = 40
TIME_FORMAT = %b %d %H:%M:%S

# Extract source IP from failed SSH attempts
EXTRACT-src_ip = Failed password for .* from (?P<src_ip>\d+\.\d+\.\d+\.\d+)

# Extract username from failed attempts
EXTRACT-user = Failed password for (?:invalid user )?(?P<user>\S+) from

# Extract action (Failed / Accepted)
EXTRACT-action = (?P<action>Failed|Accepted) password for


# ------------------------------------------------------------
# SYSLOG (Ubuntu general logs)
# ------------------------------------------------------------

[syslog]
SHOULD_LINEMERGE = false
TIME_PREFIX = \s
TIME_FORMAT = %b %d %H:%M:%S
MAX_TIMESTAMP_LOOKAHEAD = 40


# ------------------------------------------------------------
# WINDOWS SECURITY EVENT LOG
# ------------------------------------------------------------

[WinEventLog:Security]
SHOULD_LINEMERGE = false
TRANSFORMS-force_host = windows_host_override

# Parse CommandLine field cleanly for process creation events
EXTRACT-commandline = CommandLine\s*=\s*(?P<CommandLine>.+?)(?:\s*ParentCommandLine|$)


# ------------------------------------------------------------
# POWERSHELL OPERATIONAL LOG
# ------------------------------------------------------------

[WinEventLog:Microsoft-Windows-PowerShell/Operational]
SHOULD_LINEMERGE = false

# Extract script block text for hunting obfuscated commands
EXTRACT-scriptblock = ScriptBlockText=(?P<ScriptBlockText>.+?)(?:\r\n|\n|$)


# ------------------------------------------------------------
# UFW FIREWALL LOG
# ------------------------------------------------------------

[linux_ufw]
SHOULD_LINEMERGE = false
TIME_FORMAT = %b %d %H:%M:%S

# Extract connection details from UFW entries
EXTRACT-ufw_fields = UFW.*SRC=(?P<src_ip>[\d.]+).*DST=(?P<dest_ip>[\d.]+).*PROTO=(?P<protocol>\w+).*DPT=(?P<dest_port>\d+)

